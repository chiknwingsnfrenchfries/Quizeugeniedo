<!-- ============================================================
     LOAD ORDER (must be preserved):
     1. CookieYes  — establishes consent state before anything else
     2. RudderStack — loads for ALL users (consent-aware via plugin)
     3. GTM        — loads after, gated by CookieYes for GA/ads
     ============================================================ -->

<!-- 1. CookieYes — MUST be first -->
<script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/95bca4ef9c5872f825a945271ec0d765/script.js"></script>
<!-- End CookieYes -->

<!-- 2. RudderStack @rudderstack/analytics-js (CDN) + ConsentManagerPlugin -->
<!-- Loads for ALL users. Data warehouse is always-on.
     Ad platform destinations (Meta, Google Ads, etc.) are gated
     on marketing consent via the ConsentManagerPlugin. -->
<script>
// Pre-initialize the stub so queued calls work before SDK loads
window.rudderanalytics = window.rudderanalytics || [];

// ── Helper: read a CookieYes consent category from cookie ─────────────────
function getCookieYesConsent(category) {
  try {
    var match = document.cookie.match(/cookieyes-consent=([^;]+)/);
    if (!match) return null;
    var decoded = decodeURIComponent(match[1]);
    var pair = decoded.match(new RegExp(category + ':([^,]+)'));
    return pair ? pair[1] : null;
  } catch (e) { return null; }
}

// ── Build RudderStack consent state from CookieYes ────────────────────────
// analytics defaults to true for new visitors (no cookie yet) so the
// data warehouse always receives events per the consent architecture.
// Ad platform destinations are gated in the RudderStack UI by category.
function getRSConsent() {
  var analytics   = getCookieYesConsent('analytics');
  var marketing   = getCookieYesConsent('marketing');
  var functional  = getCookieYesConsent('functional');
  var performance = getCookieYesConsent('performance');
  return {
    necessary:   true,
    // Default analytics to true when no consent cookie exists yet
    // so warehouse events are never dropped for new visitors
    analytics:   analytics   === null ? true : analytics   === 'yes',
    marketing:   marketing   === 'yes',
    functional:  functional  === null ? true : functional  === 'yes',
    performance: performance === 'yes',
  };
}
</script>

<script src="https://cdn.rudderlabs.com/v3/modern/rsa.min.js"

<script>
function initRudderStack() {
  // SDK is now fully loaded — safe to call load()
  window.rudderanalytics.load(
    '3E2uEolQpd6x1LeTk22VNJK2Otv',
    'https://eugeniedosbtny.dataplane.rudderstack.com',
    {
      consentManagement: {
        enabled:  true,
        provider: 'custom',
        getConsent: getRSConsent,
      },
      storage: { type: 'cookieStorage' },
    }
  );

  // ── Re-apply consent whenever user updates CookieYes preferences ────────
  document.addEventListener('cookieyes-consent-update', function(e) {
    try {
      window.rudderanalytics.consent({
        consentManagement: {
          enabled:  true,
          provider: 'custom',
          getConsent: getRSConsent,
        },
      });
    } catch (err) {
      console.warn('[RudderStack] consent update error:', err);
    }
  });
}
</script>
<!-- End RudderStack -->

<title>Quel quartier êtes-vous? | Eugenie Do</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F2EA;
  --cream2:#EDE7D9;
  --forest:#2B3A28;
  --forest2:#1E2A1C;
  --gold:#C8952A;
  --gold2:#E8B84B;
  --warm:#8B6914;
  --ink:#1A1A1A;
  --mid:#5A5A5A;
  --light:#D4C9B0;
  --white:#FFFFFF;
  --card:#FFFDF8;
  --sans:'Nunito',system-ui,sans-serif;
  --serif:'Playfair Display',Georgia,serif;
  --r:14px;
  --r2:20px;
  --shadow:0 4px 24px rgba(0,0,0,0.10);
  --shadow2:0 8px 40px rgba(0,0,0,0.14);
}
html,body{min-height:100%;background:var(--cream);font-family:var(--sans);color:var(--ink)}
img{max-width:100%;display:block}
button{font-family:var(--sans);cursor:pointer}
a{text-decoration:none}

/* ── LANG TOGGLE ── */
.lang-bar{background:var(--forest2);display:flex;justify-content:flex-end;align-items:center;padding:8px 20px;gap:0}
.lang-toggle{display:flex;border:1px solid rgba(255,255,255,0.2);border-radius:6px;overflow:hidden}
.lang-btn{background:transparent;border:none;color:rgba(255,255,255,0.5);font-family:var(--sans);font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 13px;cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--gold);color:var(--forest2)}
.lang-btn:not(.active):hover{color:var(--white)}

/* ── HERO ── */
.hero{background:var(--cream);padding:0 20px 0}
.hero-inner{max-width:560px;margin:0 auto;text-align:center;padding:36px 0 0}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.hero-headline{font-family:var(--serif);font-size:clamp(2rem,6vw,2.8rem);font-weight:800;color:var(--forest);line-height:1.15;margin-bottom:16px}
.hero-headline em{color:var(--gold);font-style:italic}
.hero-sub{font-size:0.95rem;color:var(--mid);line-height:1.7;margin-bottom:28px;font-weight:600}
.hero-cta{display:inline-block;background:var(--gold);color:var(--white);font-size:0.9rem;font-weight:800;letter-spacing:0.04em;padding:16px 36px;border-radius:40px;border:none;transition:all .25s;box-shadow:0 4px 18px rgba(200,149,42,0.4)}
.hero-cta:hover{background:var(--warm);transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,149,42,0.5)}
.hero-img-wrap{margin-top:32px;border-radius:var(--r2) var(--r2) 0 0;overflow:hidden;max-width:480px;margin-left:auto;margin-right:auto;background:var(--cream2);min-height:220px;display:flex;align-items:center;justify-content:center}
.hero-img-placeholder{width:100%;min-height:240px;background:linear-gradient(160deg,var(--cream2) 0%,var(--light) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.hero-img-placeholder .img-icon{font-size:3rem;opacity:0.4}
.hero-img-placeholder .img-label{font-size:0.78rem;color:var(--mid);font-weight:600;letter-spacing:0.08em;text-transform:uppercase}

/* ── SECTION SHARED ── */
.section{padding:52px 20px}
.section-inner{max-width:560px;margin:0 auto}
.section-title{font-family:var(--serif);font-size:clamp(1.5rem,4vw,2rem);font-weight:800;text-align:center;margin-bottom:8px;line-height:1.25}
.section-body{font-size:0.92rem;color:var(--mid);text-align:center;line-height:1.75;font-weight:600}

/* ── HOW IT WORKS ── */
.how-section{background:var(--cream)}
.how-points{margin-top:28px;display:flex;flex-direction:column;gap:16px}
.how-point{background:var(--card);border-radius:var(--r);padding:18px 20px;border:1px solid var(--cream2);font-size:0.9rem;color:var(--mid);line-height:1.65;font-weight:600}
.how-point strong{color:var(--forest);font-weight:800}

/* ── KEY AREAS ── */
.areas-section{background:var(--forest);padding:52px 20px}
.areas-title{font-family:var(--serif);font-size:clamp(1.4rem,4vw,1.9rem);font-weight:800;text-align:center;color:var(--white);line-height:1.3;margin-bottom:32px}
.areas-grid{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.area-card{background:var(--cream);border-radius:var(--r2);padding:28px 24px;text-align:center}
.area-icon{font-size:2.4rem;margin-bottom:12px}
.area-name{font-family:var(--sans);font-weight:900;font-size:1.05rem;color:var(--gold);margin-bottom:8px}
.area-desc{font-size:0.87rem;color:var(--mid);line-height:1.65;font-weight:600}

/* ── ABOUT ── */
.about-section{background:var(--cream)}
.about-img-wrap{border-radius:var(--r2);overflow:hidden;margin-bottom:28px;background:var(--cream2);min-height:200px;display:flex;align-items:center;justify-content:center}
.about-img-placeholder{width:100%;min-height:200px;background:linear-gradient(160deg,var(--cream2),var(--light));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.about-img-placeholder .img-icon{font-size:2.5rem;opacity:0.35}
.about-img-placeholder .img-label{font-size:0.72rem;color:var(--mid);font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.about-name{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--forest);margin-bottom:6px}
.about-title-tag{font-size:0.78rem;font-weight:700;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px}
.about-body{font-size:0.9rem;color:var(--mid);line-height:1.75;font-weight:600}

/* ── TESTIMONIALS ── */
.testi-section{background:var(--forest);padding:52px 20px}
.testi-title{font-family:var(--serif);font-size:clamp(1.3rem,4vw,1.8rem);font-weight:800;color:var(--white);text-align:center;margin-bottom:32px;line-height:1.3}
.testi-list{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:24px}
.testi-card{display:flex;gap:16px;align-items:flex-start}
.testi-avatar{width:56px;height:56px;border-radius:50%;background:var(--cream2);flex-shrink:0;overflow:hidden;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.testi-content{}
.testi-text{font-size:0.9rem;color:rgba(255,255,255,0.8);line-height:1.7;font-weight:600;font-style:italic;margin-bottom:8px}
.testi-author{font-size:0.8rem;font-weight:800;color:var(--gold2)}
.testi-role{font-size:0.75rem;color:rgba(255,255,255,0.45);font-weight:600}

/* ── BOTTOM CTA ── */
.bottom-cta{background:var(--cream);padding:52px 20px;text-align:center}
.bottom-cta-inner{max-width:560px;margin:0 auto}
.bottom-badge{font-size:0.72rem;font-weight:700;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px}
.bottom-headline{font-family:var(--serif);font-size:clamp(1.4rem,4vw,1.9rem);font-weight:800;color:var(--forest);line-height:1.3;margin-bottom:10px}
.bottom-body{font-size:0.88rem;color:var(--mid);line-height:1.7;font-weight:600;margin-bottom:24px}
.bottom-quote{font-size:0.85rem;color:var(--mid);font-style:italic;margin-top:20px;font-weight:600}
.bottom-quote strong{color:var(--forest);font-weight:800}

/* ── FOOTER ── */
.footer{background:var(--forest2);padding:24px 20px;text-align:center}
.footer-copy{font-size:0.75rem;color:rgba(255,255,255,0.35);font-weight:600}
.footer-link{color:var(--gold2);font-weight:700}

/* ══════════════════════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════════════════════ */
.quiz-shell{min-height:100vh;background:var(--cream)}

/* progress */
.quiz-progress{background:var(--forest);padding:14px 20px}
.quiz-progress-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:14px}
.qp-label{font-size:0.72rem;font-weight:800;color:rgba(255,255,255,0.6);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap}
.qp-track{flex:1;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.qp-fill{height:100%;background:var(--gold2);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.qp-count{font-size:0.8rem;font-weight:900;color:var(--gold2);white-space:nowrap}

/* question area */
.quiz-area{max-width:560px;margin:0 auto;padding:36px 20px 80px}
.q-num{font-size:0.7rem;font-weight:800;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;display:block}
.q-text{font-family:var(--serif);font-size:clamp(1.2rem,3.5vw,1.6rem);font-weight:700;color:var(--forest);line-height:1.35;margin-bottom:28px}
.answers-list{display:flex;flex-direction:column;gap:12px}
.ans-btn{display:flex;align-items:center;gap:0;background:var(--card);border:2px solid var(--cream2);border-radius:var(--r);cursor:pointer;transition:all .22s;text-align:left;overflow:hidden}
.ans-btn:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.ans-btn.selected{border-color:var(--forest);background:var(--forest)}
.ans-letter{width:48px;min-height:58px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.95rem;color:var(--light);background:var(--cream2);border-right:2px solid var(--cream2);flex-shrink:0;align-self:stretch;transition:all .22s}
.ans-btn:hover .ans-letter{background:var(--gold);color:var(--white);border-color:var(--gold)}
.ans-btn.selected .ans-letter{background:var(--gold2);color:var(--forest2);border-color:var(--gold2)}
.ans-text{padding:16px 18px;font-size:0.88rem;color:var(--ink);line-height:1.55;font-weight:700;transition:color .2s}
.ans-btn.selected .ans-text{color:var(--white)}
.ans-btn:hover:not(.selected) .ans-text{color:var(--forest)}

/* nav */
.quiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:32px;padding-top:24px;border-top:1px solid var(--cream2)}
.nav-back{background:transparent;border:2px solid var(--cream2);border-radius:40px;color:var(--mid);font-weight:800;font-size:0.8rem;padding:11px 22px;transition:all .2s;letter-spacing:0.05em}
.nav-back:hover:not(:disabled){border-color:var(--mid);color:var(--forest)}
.nav-back:disabled{opacity:0.3;cursor:not-allowed}
.nav-next{background:var(--gold);border:none;border-radius:40px;color:var(--white);font-weight:900;font-size:0.88rem;padding:13px 28px;transition:all .25s;letter-spacing:0.05em;box-shadow:0 4px 16px rgba(200,149,42,0.35)}
.nav-next:hover:not(:disabled){background:var(--warm);transform:translateY(-1px);box-shadow:0 6px 22px rgba(200,149,42,0.45)}
.nav-next:disabled{background:var(--light);box-shadow:none;cursor:not-allowed;color:var(--mid)}

/* ══════════════════════════════════════════════════════
   RESULT SCREEN
══════════════════════════════════════════════════════ */
.result-hero{background:var(--forest);padding:48px 20px 52px;text-align:center}
.result-hero-inner{max-width:560px;margin:0 auto}
.result-eyebrow{font-size:0.72rem;font-weight:800;color:var(--gold2);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px}
.result-intro{font-size:0.95rem;color:rgba(255,255,255,0.7);font-weight:600;margin-bottom:6px}
.result-name{font-family:var(--serif);font-size:clamp(2rem,7vw,3rem);font-weight:800;color:var(--gold2);line-height:1.1;margin-bottom:16px}
.result-tagline{font-size:1rem;font-style:italic;color:rgba(255,255,255,0.8);font-weight:600;line-height:1.55;margin-bottom:28px;padding:0 8px}
.result-region-badge{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:5px 16px;font-size:0.75rem;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:0.08em;text-transform:uppercase}

.result-body{background:var(--cream);padding:36px 20px}
.result-body-inner{max-width:560px;margin:0 auto}

.result-card{background:var(--card);border:1px solid var(--cream2);border-radius:var(--r2);padding:28px 24px;margin-bottom:20px;box-shadow:var(--shadow)}
.result-card-title{font-size:0.68rem;font-weight:800;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px}
.result-card-body{font-size:0.9rem;color:var(--mid);line-height:1.75;font-weight:600}
.result-persona{font-size:0.92rem;color:var(--forest);line-height:1.7;font-weight:700;font-style:italic;border-left:3px solid var(--gold);padding-left:16px}

/* axes */
.axes-card{background:var(--card);border:1px solid var(--cream2);border-radius:var(--r2);padding:28px 24px;margin-bottom:20px}
.axes-title{font-size:0.68rem;font-weight:800;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:20px}
.axis-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.axis-row:last-child{margin-bottom:0}
.axis-label-row{display:flex;justify-content:space-between;align-items:center}
.axis-lbl{font-size:0.78rem;font-weight:800;color:var(--forest)}
.axis-val{font-size:0.72rem;font-weight:900;color:var(--gold)}
.axis-track{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden}
.axis-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width .8s .2s cubic-bezier(.4,0,.2,1)}

/* runner-ups */
.runners-title{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--forest);margin-bottom:16px}
.runners-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.runner-card{background:var(--card);border:1px solid var(--cream2);border-radius:var(--r);padding:16px 18px;display:flex;gap:14px;align-items:flex-start}
.runner-num{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--white);font-size:0.78rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.runner-info{}
.runner-name{font-size:0.95rem;font-weight:900;color:var(--forest);margin-bottom:2px}
.runner-region{font-size:0.7rem;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.runner-tag{font-size:0.82rem;color:var(--mid);font-weight:600;font-style:italic;line-height:1.45}

/* result CTA */
.result-cta-block{background:var(--forest);border-radius:var(--r2);padding:32px 24px;text-align:center;margin-bottom:24px}
.rcta-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:8px;line-height:1.3}
.rcta-body{font-size:0.88rem;color:rgba(255,255,255,0.65);font-weight:600;line-height:1.65;margin-bottom:24px}
.rcta-btn{display:inline-block;background:var(--gold);color:var(--white);font-size:0.88rem;font-weight:900;letter-spacing:0.04em;padding:14px 32px;border-radius:40px;border:none;transition:all .25s;box-shadow:0 4px 16px rgba(200,149,42,0.4);cursor:pointer}
.rcta-btn:hover{background:var(--warm);transform:translateY(-2px)}
.rcta-secondary{display:block;margin-top:14px;font-size:0.82rem;font-weight:700;color:rgba(255,255,255,0.45);cursor:pointer;background:none;border:none;transition:color .2s}
.rcta-secondary:hover{color:rgba(255,255,255,0.8)}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) forwards}
.fu1{animation-delay:.05s}.fu2{animation-delay:.12s}.fu3{animation-delay:.2s}.fu4{animation-delay:.28s}.fu5{animation-delay:.36s}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.donut-svg{transform:rotate(-90deg)}
.donut-bg{fill:none;stroke:rgba(255,255,255,0.12)}
.donut-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.donut-label{font-family:var(--serif);font-weight:800;fill:var(--white);dominant-baseline:middle;text-anchor:middle}
.donut-sublabel{font-family:var(--sans);font-weight:700;fill:rgba(255,255,255,0.5);dominant-baseline:middle;text-anchor:middle;text-transform:uppercase;letter-spacing:0.08em}
.match-score-section{margin-bottom:24px}
.match-score-title{font-size:0.68rem;font-weight:800;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:20px}
.top-donut-wrap{display:flex;justify-content:center;margin-bottom:28px}
.runners-donuts{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

  {id:10,fr:{q:"Quel type de lien communautaire vous importe le plus dans un quartier?",a:["Je veux connaître mes voisins et appartenir vraiment à un quartier. Les racines locales comptent.","J'apprécie un quartier amical, sans nécessiter des liens profonds. Un café sympa suffit.","Je préfère la variété et l'anonymat. J'aime être entouré de gens divers que je ne connais pas forcément.","La communauté m'est indifférente. Je veux un bon logement dans un bon emplacement."]},en:{q:"What kind of community connection matters most to you in a neighbourhood?",a:["I want to know my neighbours and feel genuine local belonging. Community roots matter.","I value a friendly neighbourhood but don't need deep ties. A good local café is enough.","I prefer variety and anonymity. I like being surrounded by diverse people I don't necessarily know.","I'm largely indifferent to community. I want a good home in a good location."]},axis1:{key:'community',scores:[1,2,4,5]},axis2:null},
  {id:11,fr:{q:"Si vous avez ou planifiez des enfants à la maison, à quel point les écoles influencent-elles votre décision?",a:["Pas pertinent — pas d'enfants à la maison. Je me concentre sur le style de vie et le confort.","Quelque peu pertinent — les enfants sont dans le tableau, mais les zones scolaires ne sont pas prioritaires.","Très pertinent — la qualité des écoles, les parcs et la sécurité des rues sont parmi mes trois critères principaux.","Plus le focus — mes enfants sont grands. Je priorise maintenant mon propre style de vie."]},en:{q:"If you have or plan to have children at home, how central are schools to your decision?",a:["Not relevant — no children at home. I'm focused on lifestyle, comfort, and right-sizing.","Somewhat relevant — children are in the picture but school zones aren't the top driver.","Very relevant — school quality, parks, and safe streets are among my top three criteria.","No longer the focus — my children are grown. I'm prioritizing my own lifestyle now."]},axis1:{key:'household',scores:[1,3,5,2]},axis2:{key:'lifePhase',scores:[5,3,1,4]}},
  {id:12,fr:{q:"Comment le temps de déplacement et la proximité du centre-ville influencent-ils votre décision?",a:["Je veux être dans le noyau ou très proche — idéalement à pied ou à un arrêt de métro du centre.","Un court trajet compte — métro ou 20 min en voiture, pas plus.","J'accepte de me déplacer — 30 à 45 minutes sont acceptables pour le bon logement et quartier.","Le trajet n'est pas un facteur majeur — je télétravaille, travaille à temps partiel ou je suis retraité(e)."]},en:{q:"How do commuting and proximity to downtown Montreal factor into your decision?",a:["I want to be in or very close to the core — walkable or one metro stop from downtown.","A short commute matters — metro or a 20-minute drive is fine, but not more.","I've accepted commuting — 30–45 minutes is acceptable for the right home and neighbourhood.","Commute is not a major factor — I work remotely, part-time, or I'm retired."]},axis1:{key:'density',scores:[5,4,2,1]},axis2:{key:'pace',scores:[4,3,2,1]}},
  {id:13,fr:{q:"Quelle est la principale chose que vous espérez trouver dans votre prochain logement que vous n'avez pas actuellement?",a:["Un premier chez-soi — un logement qui bâtit du patrimoine tout en correspondant à mon mode de vie actuel.","De l'espace pour grandir — plus de place, de meilleures écoles, une cour, l'infrastructure pour la famille.","De la liberté — moins d'entretien, meilleur emplacement, plus de temps pour ce qui compte maintenant.","Une meilleure qualité de vie — logement plus petit, mais supérieur. Proche de tout, beau, adapté à ma vie."]},en:{q:"What one thing do you most hope your next home gives you that your current situation doesn't?",a:["A foundation — a first home that builds equity while fitting my current lifestyle.","Room to grow — more space, better schools, a yard, and infrastructure for the family chapter ahead.","Freedom — less maintenance, better location, more time for what matters now.","Quality of life — smaller but better. Walkable, beautiful, and built around how I actually live today."]},axis1:{key:'lifePhase',scores:[1,2,4,5]},axis2:{key:'housing',scores:[4,5,2,1]}},
];

// ─── SCORING ENGINE ────────────────────────────────────────────────────────
function computeResults(answers){
  const accum={};const cnt={};
  AK.forEach(k=>{accum[k]=0;cnt[k]=0;});
  QUESTIONS.forEach((q,i)=>{
    const ai=answers[i];if(ai===null)return;
    accum[q.axis1.key]+=q.axis1.scores[ai];cnt[q.axis1.key]++;
    if(q.axis2){accum[q.axis2.key]+=q.axis2.scores[ai];cnt[q.axis2.key]++;}
  });
  const resp=AK.map(k=>cnt[k]>0?accum[k]/cnt[k]:3);
  const W=[1,1,1.5,1.5,1,1,1,1,1];
  const scored=NH.map(n=>{
    const dist=Math.sqrt(AK.reduce((s,k,i)=>{const d=resp[i]-n.scores[i];return s+W[i]*d*d;},0));
    const maxD=Math.sqrt(W.reduce((s,w)=>s+w*16,0));
    return{...n,dist,pct:Math.round((1-dist/maxD)*100)};
  });
  scored.sort((a,b)=>a.dist-b.dist);
  return{top:scored[0],others:scored.slice(1,5)};
}

      {/* How it works */}
      <div className="section how-section">
        <div className="section-inner">
          <h2 className="section-title" style={{color:'var(--forest)'}}>{c.howTitle}</h2>
          <p className="section-body" style={{marginTop:8}}>{c.howBody}</p>
          <div className="how-points">
            {c.howPoints.map((p,i)=>(
              <div className="how-point" key={i}>
                <strong>{p.title}</strong> {p.body}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Key areas */}
      <div className="areas-section">
        <div className="areas-title">{c.areasTitle}</div>
        <div className="areas-grid">
          {c.areas.map((a,i)=>(
            <div className="area-card" key={i}>
              <div className="area-icon">{a.icon}</div>
              <div className="area-name">{a.name}</div>
              <div className="area-desc">{a.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* About */}
      <div className="section about-section">

// ── DONUT CHART COMPONENT ─────────────────────────────────────────────────
function DonutChart({ pct, size=120, stroke=10, dark=false }) {
  const [animated, setAnimated] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    // Animate on mount via IntersectionObserver
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setAnimated(true); obs.disconnect(); }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  const r      = (size - stroke) / 2;
  const circ   = 2 * Math.PI * r;
  const offset = circ - (animated ? pct / 100 : 0) * circ;
  const cx     = size / 2;

  // Gradient colour based on score — mirrors the screenshot palette
  const color = pct >= 80 ? '#F0A500'   // gold
              : pct >= 65 ? '#E8B84B'   // amber
              : pct >= 50 ? '#E07020'   // orange
              :              '#C04030';  // red-orange

  return (
    <div className="donut-wrap" ref={ref}>
      <svg width={size} height={size} className="donut-svg">
        <circle className="donut-bg" cx={cx} cy={cx} r={r} strokeWidth={stroke}
          stroke={dark ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.12)'}/>
        <circle className="donut-fill" cx={cx} cy={cx} r={r} strokeWidth={stroke}
          stroke={color}
          strokeDasharray={circ}
          strokeDashoffset={offset}/>
        {/* Labels — counter-rotate so text is upright */}
        <g transform={`rotate(90 ${cx} ${cx})`}>
          <text className="donut-label" x={cx} y={cx - 6}
            fontSize={size * 0.22} fill={dark ? 'var(--forest)' : 'var(--white)'}>
            {pct}
          </text>
          <text className="donut-sublabel" x={cx} y={cx + size * 0.16}
            fontSize={size * 0.1} fill={dark ? 'var(--mid)' : 'rgba(255,255,255,0.5)'}>
            %
          </text>
        </g>
      </svg>
    </div>
  );
}

// ── UTM PARSER ────────────────────────────────────────────────────────────
function getUtms() {
  // UTMs may be in query string even with hash routing e.g. /#/fr?utm_source=...
  // Check both window.location.search and the hash portion
  const search = window.location.search ||
    (window.location.hash.includes('?') ? '?' + window.location.hash.split('?')[1] : '');
  const p = new URLSearchParams(search);
  return {
    utm_source:   p.get('utm_source')   || null,
    utm_medium:   p.get('utm_medium')   || null,
    utm_campaign: p.get('utm_campaign') || null,
    utm_content:  p.get('utm_content')  || null,
    utm_term:     p.get('utm_term')     || null,
  };
}

  const [serverErr,  setServerErr]  = useState('');
  const [geoLoading, setGeoLoading] = useState(true);

  // Geo-detect country on mount
  useEffect(() => {
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => {
        if (d && d.country_code) setCountry(findCountry(d.country_code));
      })
      .catch(() => {}) // silently fall back to Canada
      .finally(() => setGeoLoading(false));
  }, []);

  // Build E.164 phone number
  const buildE164 = (rawPhone, dialCode) => {
    const digits = rawPhone.replace(/\D/g, '');
    if (!digits) return null;
    const dialDigits = dialCode.replace(/\D/g, '');
    // Avoid doubling the country code if user already typed it
    if (digits.startsWith(dialDigits)) return '+' + digits;
    return dialCode + digits;
  };

  const validate = () => {
    const e = {};
    if (!firstName.trim()) e.firstName = c.formErrorRequired;
    if (!email.trim())     e.email     = c.formErrorRequired;
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim()))
                           e.email     = c.formErrorEmail;
    if (!question.trim())  e.question  = c.formErrorRequired;
    return e;
  };

  const handleSubmit = async () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setStatus('submitting');

    const utms = getUtms();
    const e164 = phone.trim() ? buildE164(phone.trim(), country.dial) : null;

    const payload = {
      first_name:         firstName.trim(),
      email:              email.trim().toLowerCase(),
      question:           question.trim(),
      phone:              e164,
      country:            country.name,
      marketing_consent:  consent,
      source_url:         window.location.href,
      top_match:          result.name,
      top_match_region:   result.region.en,
      match_pct:          result.pct,
      lang,
      ...utms,
    };

    try {
      await insertLead(payload);
      setStatus('success');

      // RudderStack identify — stitch email to anonymous session
      rs('identify', email.trim().toLowerCase(), {
        firstName:          firstName.trim(),
        email:              email.trim().toLowerCase(),
        phone:              e164,
        country:            country.name,
        marketing_consent:  consent,
        lang,
        top_match:          result.name,
        top_match_region:   result.region.en,
        match_pct:          result.pct,
      });

      rs('track', 'Lead Form Submitted', {
        lang,
        top_match:          result.name,
        top_match_region:   result.region.en,
        match_pct:          result.pct,
        has_phone:          !!e164,
        marketing_consent:  consent,
        ...utms,
      });

    } catch (err) {
      console.error('[Supabase]', err);
      setServerErr(c.formErrorServer);
      setStatus('error');
    }
  };

  const clearErr = field => setErrors(ev => ({...ev, [field]: undefined}));

  if (status === 'success') return (
    <div className="form-success">
      <div className="form-success-icon">✅</div>
      <p className="form-success-text">{c.formSuccess}</p>
    </div>
  );

  return (
    <div className="lead-form">

      {/* First Name */}
      <div className="form-field">
        <label className="form-label">{c.formFirstName} *</label>
        <input className={`form-input${errors.firstName?' error':''}`}
          type="text" placeholder={c.formFirstNamePlaceholder}
          value={firstName} onChange={e=>setFirstName(e.target.value)}
          onFocus={()=>clearErr('firstName')} disabled={status==='submitting'}/>
        {errors.firstName && <span className="form-error">{errors.firstName}</span>}
      </div>

      {/* Email */}
      <div className="form-field">
        <label className="form-label">{c.formEmail} *</label>
        <input className={`form-input${errors.email?' error':''}`}
          type="email" placeholder={c.formEmailPlaceholder}
          value={email} onChange={e=>setEmail(e.target.value)}
          onFocus={()=>clearErr('email')} disabled={status==='submitting'}/>
        {errors.email && <span className="form-error">{errors.email}</span>}
      </div>

      {/* Question */}
      <div className="form-field">
        <label className="form-label">{c.formQuestion} *</label>
        <textarea className={`form-input${errors.question?' error':''}`}
          placeholder={c.formQuestionPlaceholder} rows={3}
          value={question} onChange={e=>setQuestion(e.target.value)}
          onFocus={()=>clearErr('question')} disabled={status==='submitting'}
          style={{resize:'vertical',minHeight:'80px',fontFamily:'inherit'}}/>
        {errors.question && <span className="form-error">{errors.question}</span>}
      </div>

      {/* Country */}
      <div className="form-field">
        <label className="form-label">{c.formCountry}</label>
        <select className="form-input" value={country.code}
          onChange={e=>setCountry(findCountry(e.target.value))}
          disabled={status==='submitting'||geoLoading}
          style={{appearance:'auto',cursor:'pointer'}}>
          {COUNTRIES.map(co=>(
            <option key={co.code} value={co.code}>{co.name} ({co.dial})</option>
          ))}
        </select>
      </div>

      {/* Phone */}
      <div className="form-field">
        <label className="form-label">{c.formPhone} <span style={{opacity:0.45,fontWeight:600,letterSpacing:0}}>(optional)</span></label>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <span style={{background:'rgba(255,255,255,0.08)',border:'1.5px solid rgba(255,255,255,0.15)',borderRadius:'var(--r)',padding:'13px 12px',color:'var(--gold2)',fontWeight:800,fontSize:'0.85rem',whiteSpace:'nowrap',minWidth:'56px',textAlign:'center'}}>
            {country.dial}
          </span>
          <input className="form-input" type="tel"
            placeholder={c.formPhonePlaceholder} value={phone}
            onChange={e=>setPhone(e.target.value)}
            disabled={status==='submitting'} style={{flex:1}}/>
        </div>
      </div>

      {/* Marketing consent */}
      <label style={{display:'flex',alignItems:'flex-start',gap:'12px',cursor:'pointer',padding:'14px 16px',background:'rgba(255,255,255,0.05)',borderRadius:'var(--r)',border:'1.5px solid rgba(255,255,255,0.1)'}}>
        <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)}
          disabled={status==='submitting'}
          style={{marginTop:'2px',accentColor:'var(--gold)',width:'16px',height:'16px',flexShrink:0}}/>
        <span style={{fontSize:'0.83rem',color:'rgba(255,255,255,0.7)',fontWeight:600,lineHeight:1.55}}>
          {c.formConsent}
        </span>
      </label>

      {status==='error' && <span className="form-error">{serverErr}</span>}

      <button className="form-submit" onClick={handleSubmit} disabled={status==='submitting'}>
        {status==='submitting' ? c.formSubmitting : c.formSubmit}
      </button>
    </div>
  );
}

function Footer({c}){
  return(
    <footer className="footer">
      <p className="footer-copy">{c.footerCopy} · <a className="footer-link" href="https://eugeniedo.com" target="_blank" rel="noopener noreferrer">eugeniedo.com</a></p>
    </footer>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
